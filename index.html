<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Japanese Handwriting Pad</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./stroke-counts.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <h1 id="app-title" class="visually-hidden">手書き認識パッド</h1>

      <output id="recognized-text" class="result-box" aria-live="polite">
        準備中...
      </output>

      <canvas
        id="handwriting-pad"
        aria-label="手書き入力パッド"
      ></canvas>

      <div class="actions" aria-label="操作">
        <button
          id="undo-button"
          class="action-button undo-button"
          type="button"
          aria-keyshortcuts="Z"
          disabled
        >
          戻る
        </button>
        <button id="clear-button" class="action-button clear-button" type="button">
          クリア
        </button>
      </div>
    </main>
  </body>
</html>
